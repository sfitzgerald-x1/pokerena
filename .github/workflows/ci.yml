name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Install Node dependencies
        run: ./scripts/bootstrap-node-deps.sh

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Render generated config
        run: python -m pokerena server render-config --config config/server.local.example.yaml

      - name: Smoke test damage calc
        run: |
          printf '%s\n' '{"generation":2,"attacker":{"species":"Snorlax","options":{"level":100}},"defender":{"species":"Raikou","options":{"level":100}},"move":{"name":"Double-Edge"},"field":{}}' \
            | python -m pokerena calc damage --stdin
